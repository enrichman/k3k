version: 2

release:
  draft: true
  replace_existing_draft: true
  prerelease: auto

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: k3k
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - "amd64"
      - "arm64"
      - "s390x"
    ldflags:
      - -w -s # strip debug info and symbol table
      - -X "github.com/rancher/k3k/pkg/buildinfo.Version={{ .Tag }}"

  - id: k3k-kubelet
    main: ./k3k-kubelet
    binary: k3k-kubelet
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - "amd64"
      - "arm64"
      - "s390x"
    ldflags:
      - -w -s # strip debug info and symbol table
      - -X "github.com/rancher/k3k/pkg/buildinfo.Version={{ .Tag }}"

  - id: k3kcli
    main: ./cli
    binary: k3kcli
    env:
      - CGO_ENABLED=0
    goarch:
      - "amd64"
      - "arm64"
    ldflags:
      - -w -s # strip debug info and symbol table
      - -X "github.com/rancher/k3k/pkg/buildinfo.Version={{ .Tag }}"

archives:
  - formats:
      - binary
    name_template: >-
      {{ .Binary }}-{{- .Os }}-{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip

# For the image_templates we are using the following expression to build images for the correct registry
#    {{- if .Env.REGISTRY }}{{ .Env.REGISTRY }}/{{ end }}
#
# REGISTRY=        -> rancher/k3k:vX.Y.Z
# REGISTRY=ghcr.io -> ghcr.io/rancher/k3k:latest:vX.Y.Z
#
dockers_v2:
  # k3k
  - id: k3k
    ids:
      - k3k
      - k3kcli
    dockerfile: "package/Dockerfile.k3k"
    images:
      - "{{- if .Env.REGISTRY }}{{ .Env.REGISTRY }}/{{ end }}{{ .Env.REPO }}"
    tags:
      - "{{ .Tag }}"
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      BIN_K3K: k3k
      BIN_K3KCLI: k3kcli
    flags:
      - "--pull"

  # k3k-kubelet
  - id: k3k-kubelet
    ids:
      - k3k-kubelet
    dockerfile: "package/Dockerfile.k3k-kubelet"
    images:
      - "{{- if .Env.REGISTRY }}{{ .Env.REGISTRY }}/{{ end }}{{ .Env.REPO }}-kubelet"
    tags:
      - "{{ .Tag }}"
    platforms:
      - linux/amd64
      - linux/arm64
    build_args:
      BIN_K3K_KUBELET: k3k-kubelet
    flags:
      - "--pull"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
