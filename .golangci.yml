version: "2"

linters:
  enable:
  - misspell
  - wsl_v5
  - importas
  exclusions:
    rules:
    # Allow dot imports for Ginkgo/Gomega in test framework
    - path: tests/framework/
      text: "dot imports"
      linters:
      - staticcheck
  settings:
    # Enforce import aliases
    importas:
      alias:
      # --- Kubernetes API Machinery & Utilities ---
      - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
        alias: metav1
      - pkg: k8s.io/apimachinery/pkg/api/errors
        alias: apierrors
      - pkg: k8s.io/apimachinery/pkg/runtime
        alias: runtime
      - pkg: k8s.io/apimachinery/pkg/types
        alias: types

      # --- Core Kubernetes APIs ---
      - pkg: k8s.io/api/core/v1
        alias: corev1
      - pkg: k8s.io/api/apps/v1
        alias: appsv1
      - pkg: k8s.io/api/networking/v1
        alias: networkingv1
      - pkg: k8s.io/api/rbac/v1
        alias: rbacv1
      - pkg: k8s.io/client-go/kubernetes/scheme
        alias: clientgoscheme

      # --- Controller Runtime Packages ---
      - pkg: sigs.k8s.io/controller-runtime
        alias: ctrl
      - pkg: sigs.k8s.io/controller-runtime/pkg/client
        alias: client
      - pkg: sigs.k8s.io/controller-runtime/pkg/controller
        alias: controller
      - pkg: sigs.k8s.io/controller-runtime/pkg/controller/controllerutil
        alias: controllerutil
      - pkg: sigs.k8s.io/controller-runtime/pkg/log
        alias: ctrllog
      - pkg: sigs.k8s.io/controller-runtime/pkg/log/zap
        alias: ctrlzap
      - pkg: sigs.k8s.io/controller-runtime/pkg/manager
        alias: manager
      - pkg: sigs.k8s.io/controller-runtime/pkg/metrics/server
        alias: metricsserver
      - pkg: sigs.k8s.io/controller-runtime/pkg/reconcile
        alias: reconcile

      # --- K3k Packages ---
      - pkg: github.com/rancher/k3k/pkg/controller
        alias: k3kcontroller

formatters:
  enable:
  - gci
  - gofmt
  - gofumpt
  settings:
    gci:
      # The default order is `standard > default > custom > blank > dot > alias > localmodule`.
      custom-order: true
      sections:
      - standard
      - default
      - alias
      - localmodule
      - dot
      - blank
    gofmt:
      rewrite-rules:
      - pattern: 'interface{}'
        replacement: 'any'
